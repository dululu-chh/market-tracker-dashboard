name: Update Market Dashboard

on:
  schedule:
    - cron: '0 * * * *' # Every hour on the hour
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update market snapshots
        working-directory: ${{ github.workspace }}
        run: |
          python scripts/fetch_market_data.py --config config/market_watchlist.json --output reports/us
          python scripts/fetch_market_data.py --config config/market_watchlist.json --output reports/tw
          python scripts/fetch_news.py --output reports/news

      - name: Build dashboard site
        working-directory: ${{ github.workspace }}
        run: python scripts/build_market_site.py

      - name: Deploy dashboard to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: market_dashboard/site

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ reports/news/ reports/us/ reports/tw/
          git commit -m "Automated update" || echo "No changes to commit"
          git push
